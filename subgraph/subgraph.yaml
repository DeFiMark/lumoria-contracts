specVersion: 1.0.0
description: Lumoria — curated launchpad on Uniswap V4 (LumoriaHook pool-level
  BNB taxes) on BNB Chain.
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: Database
    network: bsc
    source:
      abi: Database
      address: "0x9af6a42a78Fe4Ec3c7eFDFF3a2D52ecb5aad0d47"
      startBlock: 111199483
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      file: ./src/database.ts
      entities:
        - Token
        - Module
        - ModuleAddress
        - Creator
        - PlatformConfig
        - PlatformDayData
        - UserVolume
        - SystemAddresses
        - Holder
        - User
      abis:
        - name: Database
          file: ./abis/Database.json
        - name: TaxHandler
          file: ./abis/TaxHandler.json
        - name: LumoriaToken
          file: ./abis/LumoriaToken.json
        - name: RewardModule
          file: ./abis/RewardModule.json
        - name: BurnModule
          file: ./abis/BurnModule.json
        - name: LiquidityModule
          file: ./abis/LiquidityModule.json
        - name: PrizePool
          file: ./abis/PrizePool.json
      eventHandlers:
        - event: TokenRegistered(indexed address,indexed address,address)
          handler: handleTokenRegistered
        - event: VolumeRegistered(indexed address,indexed address,uint256)
          handler: handleVolumeRegistered
        - event: PlatformFeeUpdated(uint256,uint256)
          handler: handlePlatformFeeUpdated
        - event: LaunchFeeUpdated(uint256,uint256)
          handler: handleLaunchFeeUpdated
  - kind: ethereum
    name: Generator
    network: bsc
    source:
      abi: Generator
      address: "0xCe5eD020D36aC8Ca1D87319769819E8aCE7723f2"
      startBlock: 111199483
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      file: ./src/generator.ts
      entities:
        - Token
        - Raise
        - TokenAllocation
        - VestingSchedule
      abis:
        - name: Generator
          file: ./abis/Generator.json
        - name: FlatCurve
          file: ./abis/FlatCurve.json
      eventHandlers:
        - event: ProjectGenerated(indexed address,indexed address,indexed
            address,string,string,uint256,uint256,uint8)
          handler: handleProjectGenerated
        - event: FlatCurveLaunched(indexed address,indexed address,uint256)
          handler: handleFlatCurveLaunched
        - event: AllocationMinted(indexed address,indexed address,uint256)
          handler: handleAllocationMinted
        - event: AllocationVested(indexed address,indexed address,indexed
            uint256,uint256,uint64,uint64)
          handler: handleAllocationVested
  - kind: ethereum
    name: LumoriaHook
    network: bsc
    source:
      abi: LumoriaHook
      address: "0x0C2fCddDbcd5ae744F1ef26D9e09F4338533Eaec"
      startBlock: 111199483
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      file: ./src/hook.ts
      entities:
        - Token
        - Trade
        - TokenDayData
        - TokenHourData
        - TokenMinuteData
        - PlatformDayData
      abis:
        - name: LumoriaHook
          file: ./abis/LumoriaHook.json
      eventHandlers:
        - event: TokenPurchased(indexed address,indexed
            address,uint256,uint256,uint256,uint256,uint160,int24)
          handler: handleTokenPurchased
        - event: TokenSold(indexed address,indexed
            address,uint256,uint256,uint256,uint256,uint160,int24)
          handler: handleTokenSold
        - event: LumoriaPoolInitialized(indexed address,indexed bytes32)
          handler: handleLumoriaPoolInitialized
  - kind: ethereum
    name: LumoriaLiquidityVault
    network: bsc
    source:
      abi: LumoriaLiquidityVault
      address: "0x6d1930E4b9b8D1bCe27E0d6DF4A7120bdc7A6F31"
      startBlock: 111199483
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      file: ./src/vault.ts
      entities:
        - Token
      abis:
        - name: LumoriaLiquidityVault
          file: ./abis/LumoriaLiquidityVault.json
      eventHandlers:
        - event: PoolInitialized(indexed address,indexed bytes32,uint160)
          handler: handlePoolInitialized
        - event: LiquidityLocked(indexed address,uint256,uint256,uint128,uint128)
          handler: handleLiquidityLocked
  - kind: ethereum
    name: FeeReceiver
    network: bsc
    source:
      abi: FeeReceiver
      address: "0xaEdF41a52eF535267f6516C91998119a028555af"
      startBlock: 111199483
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      file: ./src/feeReceiver.ts
      entities:
        - PlatformConfig
        - PlatformDayData
      abis:
        - name: FeeReceiver
          file: ./abis/FeeReceiver.json
      eventHandlers:
        - event: FeeReceived(indexed address,uint256)
          handler: handleFeeReceived
  - kind: ethereum
    name: RebateContract
    network: bsc
    source:
      abi: RebateContract
      address: "0x7fFfDbdD4eD1b6D635Fe66a73862d80b37b02718"
      startBlock: 111199483
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      file: ./src/rebate.ts
      entities:
        - Rebate
        - RebateCredit
        - Token
      abis:
        - name: RebateContract
          file: ./abis/RebateContract.json
      eventHandlers:
        - event: RebateFunded(indexed address,indexed address,uint256,uint256)
          handler: handleRebateFunded
        - event: RebateToppedUp(indexed address,uint256,uint256)
          handler: handleRebateToppedUp
        - event: RebateCredited(indexed address,indexed address,uint256)
          handler: handleRebateCredited
        - event: RebateBpsUpdated(indexed address,uint256,uint256)
          handler: handleRebateBpsUpdated
        - event: RebateWithdrawn(indexed address,uint256)
          handler: handleRebateWithdrawn
        - event: RebateDeactivated(indexed address)
          handler: handleRebateDeactivated
  - kind: ethereum
    name: VestingVault
    network: bsc
    source:
      abi: VestingVault
      address: "0x7fdCa82323b77C7fb11a674F4b75782Fb1bd5d53"
      startBlock: 111199483
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      file: ./src/vestingVault.ts
      entities:
        - VestingSchedule
        - VestingRelease
        - User
      abis:
        - name: VestingVault
          file: ./abis/VestingVault.json
      eventHandlers:
        - event: ScheduleCreated(indexed uint256,indexed address,indexed
            address,uint256,uint64,uint64,uint64)
          handler: handleScheduleCreated
        - event: TokensReleased(indexed uint256,indexed address,uint256)
          handler: handleTokensReleased
templates:
  - kind: ethereum
    name: LumoriaToken
    network: bsc
    source:
      abi: LumoriaToken
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      file: ./src/token.ts
      entities:
        - Token
        - Holder
        - User
        - HolderDayData
        - SystemAddresses
      abis:
        - name: LumoriaToken
          file: ./abis/LumoriaToken.json
      eventHandlers:
        - event: Transfer(indexed address,indexed address,uint256)
          handler: handleTransfer
  - kind: ethereum
    name: TaxHandler
    network: bsc
    source:
      abi: TaxHandler
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      file: ./src/taxHandler.ts
      entities:
        - Token
        - Module
        - ModuleAddress
        - ModuleEvent
        - FeeChange
        - PendingChange
      abis:
        - name: TaxHandler
          file: ./abis/TaxHandler.json
        - name: RewardModule
          file: ./abis/RewardModule.json
      eventHandlers:
        - event: FeesUpdated(uint256,uint256,uint256,uint256)
          handler: handleFeesUpdated
        - event: FeeChangeProposed(uint256,uint256,uint256)
          handler: handleFeeChangeProposed
        - event: FeeChangeCancelled()
          handler: handleFeeChangeCancelled
        - event: ModuleAdded(indexed uint8,indexed address,uint256,uint256)
          handler: handleModuleAdded
        - event: ModuleRemoved(indexed uint8,indexed address)
          handler: handleModuleRemoved
        - event: ModuleUpdated(indexed uint8,indexed address,uint256,uint256)
          handler: handleModuleUpdated
        - event: ModuleChangeProposed(uint8,indexed uint8,uint256,uint256,uint256)
          handler: handleModuleChangeProposed
        - event: ModuleRebalanceProposed(uint256[],uint256[],uint256[])
          handler: handleModuleRebalanceProposed
        - event: ModuleChangeCancelled()
          handler: handleModuleChangeCancelled
        - event: ManagementRenounced(indexed address,uint256)
          handler: handleManagementRenounced
  - kind: ethereum
    name: CreatorFeeModule
    network: bsc
    source:
      abi: CreatorFeeModule
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      file: ./src/creatorFeeModule.ts
      entities:
        - Module
        - CreatorFeeAccrual
        - CreatorFeeWithdrawal
      abis:
        - name: CreatorFeeModule
          file: ./abis/CreatorFeeModule.json
      eventHandlers:
        - event: TaxAccrued(indexed address,uint256,uint256)
          handler: handleTaxAccrued
        - event: TaxWithdrawn(indexed address,uint256)
          handler: handleTaxWithdrawn
        - event: RecipientUpdated(indexed address,indexed address)
          handler: handleRecipientUpdated
  - kind: ethereum
    name: RewardModule
    network: bsc
    source:
      abi: RewardModule
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      file: ./src/rewardModule.ts
      entities:
        - Module
        - RewardClaim
      abis:
        - name: RewardModule
          file: ./abis/RewardModule.json
      eventHandlers:
        - event: TaxReceived(uint256)
          handler: handleRewardTaxReceived
        - event: DividendsDistributed(uint256,uint256)
          handler: handleDividendsDistributed
        - event: RewardClaimed(indexed address,uint256)
          handler: handleRewardClaimed
  - kind: ethereum
    name: BurnModule
    network: bsc
    source:
      abi: BurnModule
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      file: ./src/burnModule.ts
      entities:
        - Module
        - BurnExecution
      abis:
        - name: BurnModule
          file: ./abis/BurnModule.json
      eventHandlers:
        - event: BurnExecuted(uint256,uint256,uint256)
          handler: handleBurnExecuted
        - event: IntervalUpdated(uint256,uint256)
          handler: handleBurnIntervalUpdated
  - kind: ethereum
    name: LiquidityModule
    network: bsc
    source:
      abi: LiquidityModule
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      file: ./src/liquidityModule.ts
      entities:
        - Module
        - LiquidityInjection
      abis:
        - name: LiquidityModule
          file: ./abis/LiquidityModule.json
      eventHandlers:
        - event: LiquidityAdded(uint256,uint256,uint256,uint256)
          handler: handleLiquidityAdded
        - event: IntervalUpdated(uint256,uint256)
          handler: handleLiquidityIntervalUpdated
  - kind: ethereum
    name: PrizePool
    network: bsc
    source:
      abi: PrizePool
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      file: ./src/prizePool.ts
      entities:
        - Module
        - Token
        - PrizeEpoch
        - PrizeTicket
        - PrizeClaim
      abis:
        - name: PrizePool
          file: ./abis/PrizePool.json
      eventHandlers:
        - event: TaxReceived(indexed uint256,uint256)
          handler: handlePrizeTaxReceived
        - event: EpochLengthQueued(uint256)
          handler: handleEpochLengthQueued
        - event: EpochLengthApplied(indexed uint256,uint256)
          handler: handleEpochLengthApplied
        - event: RootPosted(indexed uint256,bytes32,uint256,uint256)
          handler: handleRootPosted
        - event: RootInvalidated(indexed uint256)
          handler: handleRootInvalidated
        - event: RandomnessFulfilled(indexed uint256,uint256)
          handler: handleRandomnessFulfilled
        - event: PrizeClaimed(indexed uint256,indexed address,uint256)
          handler: handlePrizeClaimed
        - event: LotteryClaimed(indexed uint256,indexed uint256,indexed address,uint256)
          handler: handleLotteryClaimed
        - event: PotRolledOver(indexed uint256,indexed uint256,uint256,string)
          handler: handlePotRolledOver
        - event: DonatedToRewards(indexed uint256,address,uint256)
          handler: handleDonatedToRewards
  - kind: ethereum
    name: MilestoneRewardModule
    network: bsc
    source:
      abi: MilestoneRewardModule
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      file: ./src/milestoneRewardModule.ts
      entities:
        - Module
        - MilestoneRelease
      abis:
        - name: MilestoneRewardModule
          file: ./abis/MilestoneRewardModule.json
      eventHandlers:
        - event: TaxReceived(uint256,uint256)
          handler: handleMilestoneTaxReceived
        - event: RewardsReleased(indexed address,indexed address,uint256,uint256,string)
          handler: handleRewardsReleased
  - kind: ethereum
    name: FlatCurve
    network: bsc
    source:
      abi: FlatCurve
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      file: ./src/flatCurve.ts
      entities:
        - Raise
        - Contribution
      abis:
        - name: FlatCurve
          file: ./abis/FlatCurve.json
      eventHandlers:
        - event: ContributionMade(indexed address,uint256,uint256,uint256)
          handler: handleContributionMade
        - event: ContributionRefunded(indexed address,uint256)
          handler: handleContributionRefunded
        - event: RaiseLaunched(indexed address,uint256,uint256,uint256,uint256)
          handler: handleRaiseLaunched
        - event: RaiseFailed(indexed address,uint256)
          handler: handleRaiseFailed
        - event: TokensClaimed(indexed address,uint256)
          handler: handleTokensClaimed
